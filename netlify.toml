# Netlify: Cache headers for Next.js on Netlify
# Monorepo: base must be set so plugin and deps resolve from apps/web
[build]
  base = "apps/web"
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
