<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="150" viewBox="0 0 520 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&amp;display=swap');
    </style>
  </defs>
  <!-- Icon background -->
  <rect x="30" y="23" width="104" height="104" rx="28" fill="rgb(81, 255, 0)"/>
  <!-- B in icon -->
  <text x="82" y="100" font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="68" text-anchor="middle" fill="rgb(9, 21, 27)">B</text>
  <!-- bashly wordmark as single word -->
  <text x="160" y="100" font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="80" letter-spacing="-3" fill="rgb(116, 255, 51)">bash<tspan fill="rgb(100, 171, 206)">ly</tspan></text>
</svg>